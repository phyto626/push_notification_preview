<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>推播通知預覽工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            align-items: start;
        }


        /* ===== 左側編輯區 ===== */
        .editor-section {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        .editor-section h1 {
            font-size: 24px;
            margin-bottom: 25px;
            color: #333;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #555;
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #FFC107;
            box-shadow: 0 0 0 3px rgba(255, 193, 7, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .char-count {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
            text-align: right;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            flex: 1;
        }

        .btn-add {
            background: #FFC107;
            color: #333;
        }

        .btn-add:hover {
            background: #ffb300;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 193, 7, 0.3);
        }

        .btn-add:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .btn-export {
            background: #007bff;
            color: white;
        }

        .btn-export:hover {
            background: #0056b3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 123, 255, 0.3);
        }

        .btn-copy {
            background: #28a745;
            color: white;
        }

        .btn-copy:hover {
            background: #218838;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(40, 167, 69, 0.3);
        }

        .notifications-list {
            margin-top: 30px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        .notifications-list h3 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #555;
        }

        .notification-item {
            background: #f9f9f9;
            border-left: 3px solid #FFC107;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .notification-item-text {
            flex: 1;
            font-size: 13px;
            color: #666;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .notification-item-delete {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            margin-left: 10px;
            transition: all 0.3s;
        }

        .notification-item-delete:hover {
            background: #ff5252;
        }

        /* ===== 右側預覽區 ===== */
        .preview-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .preview-container {
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .phone-frame {
            width: 360px;
            background: #000;
            border-radius: 40px;
            padding: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        .phone-frame::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 25px;
            background: #000;
            border-radius: 0 0 30px 30px;
            z-index: 10;
        }

        .phone-screen {
            width: 100%;
            height: 600px;
            background: white;
            border-radius: 30px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .phone-header {
            background: #FFC107;
            color: #333;
            padding: 15px 20px;
            text-align: center;
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 50px;
        }

        .phone-header-back {
            font-size: 24px;
            cursor: pointer;
        }

        .phone-header-title {
            flex: 1;
            text-align: center;
        }

        .phone-header-close {
            font-size: 24px;
            cursor: pointer;
        }

        .phone-notification-banner {
            background: #f0f0f0;
            padding: 10px 15px;
            font-size: 12px;
            color: #666;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .notification-banner-icon {
            width: 24px;
            height: 24px;
            background: #999;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
        }

        .phone-tabs {
            display: flex;
            background: white;
            border-bottom: 1px solid #e0e0e0;
            padding: 0 20px;
        }

        .phone-tab {
            flex: 1;
            padding: 12px 10px;
            text-align: center;
            font-size: 14px;
            color: #999;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            transition: all 0.3s;
        }

        .phone-tab.active {
            color: #333;
            border-bottom-color: #FF6B35;
            font-weight: 600;
        }

        .phone-content {
            flex: 1;
            overflow-y: auto;
            padding: 15px 0;
        }

        .notification-card {
            padding: 12px 15px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }

        .notification-icon {
            width: 40px;
            height: 40px;
            background: #1e88e5;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            flex-shrink: 0;
        }

        .notification-content {
            flex: 1;
            min-width: 0;
        }

        .notification-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }

        .notification-tag {
            display: inline-block;
            background: white;
            border: 1px solid #ff6b6b;
            color: #ff6b6b;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }

        .notification-title {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
            line-height: 1.4;
        }

        .notification-subtitle {
            font-size: 12px;
            color: #999;
            margin-bottom: 4px;
            line-height: 1.4;
        }

        .notification-meta {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            font-size: 11px;
            color: #ccc;
        }

        .notification-arrow {
            color: #1e88e5;
            font-size: 18px;
            flex-shrink: 0;
        }

        .empty-state {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #ccc;
            font-size: 14px;
            text-align: center;
            padding: 20px;
        }

        .preview-label {
            font-size: 13px;
            font-weight: 600;
            color: #666;
            margin-bottom: 10px;
        }

        .btn-load-examples {
            background: #28a745;
            color: white;
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
        }

        .btn-load-examples:hover {
            background: #218838;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(40, 167, 69, 0.3);
        }

        /* ===== 響應式設計 ===== */
        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
            }

            .phone-frame {
                width: 100%;
                max-width: 360px;
            }
        }

        @media (max-width: 768px) {
            .editor-section {
                padding: 20px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .button-group {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }

            .api-config {
                flex-direction: column;
            }

            .api-config input,
            .api-config button {
                width: 100%;
            }
        }

        /* ===== 動畫效果 ===== */
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .notification-card {
            animation: slideIn 0.3s ease-out;
        }

        /* ===== 滾動條美化 ===== */
        .phone-content::-webkit-scrollbar {
            width: 4px;
        }

        .phone-content::-webkit-scrollbar-track {
            background: transparent;
        }

        .phone-content::-webkit-scrollbar-thumb {
            background: #ddd;
            border-radius: 2px;
        }

        .phone-content::-webkit-scrollbar-thumb:hover {
            background: #bbb;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 左側編輯區 -->
        <div>

            <div class="editor-section">
                <h1>📝 編輯推播通知</h1>

                <div class="form-group">
                    <label for="tagSelect">活動標籤 *</label>
                    <select id="tagSelect">
                        <option value="">-- 選擇標籤 --</option>
                        <option value="限時抽獎">限時抽獎</option>
                        <option value="獨家優惠">獨家優惠</option>
                        <option value="會員專屬">會員專屬</option>
                        <option value="新品上架">新品上架</option>
                        <option value="custom">自訂輸入</option>
                    </select>
                </div>

                <div class="form-group" id="customTagGroup" style="display: none;">
                    <label for="customTag">自訂標籤</label>
                    <input type="text" id="customTag" placeholder="輸入自訂標籤">
                </div>

                <div class="form-group">
                    <label for="titleInput">標題文字 * <span id="titleCount">(0/50)</span></label>
                    <textarea id="titleInput" placeholder="輸入通知標題，最多 50 字" maxlength="50"></textarea>
                    <div class="char-count" id="titleCharCount">0 / 50 字</div>
                </div>

                <div class="form-group">
                    <label for="subtitleInput">副標說明文字</label>
                    <textarea id="subtitleInput" placeholder="輸入副標說明，最多 100 字" maxlength="100"></textarea>
                    <div class="char-count" id="subtitleCharCount">0 / 100 字</div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="sendDateTime">發送日期時間</label>
                        <input type="datetime-local" id="sendDateTime">
                    </div>
                    <div class="form-group">
                        <label for="deadlineDate">活動截止日</label>
                        <input type="date" id="deadlineDate">
                    </div>
                </div>

                <div class="button-group">
                    <button class="btn btn-add" id="addBtn">+ 新增通知</button>
                </div>

                <div class="button-group">
                    <button class="btn btn-copy" id="copyBtn">📋 複製文案</button>
                    <button class="btn btn-export" id="exportBtn">⬇️ 匯出 JSON</button>
                </div>

                <div class="notifications-list" id="notificationsList" style="display: none;">
                    <h3>已新增的通知 (<span id="notificationCount">0</span>/5)</h3>
                    <div id="notificationsContainer"></div>
                </div>
            </div>
        </div>

        <!-- 右側預覽區 -->
        <div class="preview-section">
            <div>
                <div class="preview-label">📱 手機預覽</div>
                <button class="btn-load-examples" onclick="loadExamples()">📌 載入範例通知</button>
            </div>

            <div class="preview-container">
                <div class="phone-frame">
                    <div class="phone-screen">
                        <div class="phone-header">
                            <div class="phone-header-back">←</div>
                            <div class="phone-header-title">消息通知</div>
                            <div class="phone-header-close">✕</div>
                        </div>

                        <div class="phone-notification-banner">
                            <div class="notification-banner-icon">ℹ</div>
                            <div>尚未開啟消息通知，前往設定</div>
                        </div>

                        <div class="phone-tabs">
                            <div class="phone-tab">公告</div>
                            <div class="phone-tab active">活動</div>
                            <div class="phone-tab">個人</div>
                        </div>

                        <div class="phone-content" id="phoneContent">
                            <div class="empty-state">還沒有通知</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 全局狀態
        const state = {
            notifications: [],
            maxNotifications: 5
        };

        // 預設範例
        const examples = [
            {
                id: Date.now() + 1,
                tag: '限時抽獎',
                title: '台塑便利家發禮物🎁兒童節快樂，快來曬小小英雄',
                subtitle: '點擊留言曬照👆 活動只到2026/4/6',
                sendTime: '2026-03-25T16:30',
                deadline: '2026-04-06'
            },
            {
                id: Date.now() + 2,
                tag: '限時抽獎',
                title: '現在完成收藏任務⭐抱走可愛小禮，前100名加碼抽',
                subtitle: '點看怎麼玩👆 活動只到2026/03/29',
                sendTime: '2026-03-18T16:00',
                deadline: '2026-03-29'
            },
            {
                id: Date.now() + 3,
                tag: '獨家優惠',
                title: '🛒限時搶購！全館8折起！',
                subtitle: '手刀快搶，好物不等人！立即選購👆',
                sendTime: '2026-04-10T10:00',
                deadline: ''
            }
        ];

        // DOM 元素
        const tagSelect = document.getElementById('tagSelect');
        const customTagGroup = document.getElementById('customTagGroup');
        const customTag = document.getElementById('customTag');
        const titleInput = document.getElementById('titleInput');
        const subtitleInput = document.getElementById('subtitleInput');
        const sendDateTime = document.getElementById('sendDateTime');
        const deadlineDate = document.getElementById('deadlineDate');
        const addBtn = document.getElementById('addBtn');
        const copyBtn = document.getElementById('copyBtn');
        const exportBtn = document.getElementById('exportBtn');
        const notificationsContainer = document.getElementById('notificationsContainer');
        const notificationsList = document.getElementById('notificationsList');
        const notificationCount = document.getElementById('notificationCount');
        const phoneContent = document.getElementById('phoneContent');
        const titleCharCount = document.getElementById('titleCharCount');
        const subtitleCharCount = document.getElementById('subtitleCharCount');


        // 載入範例
        function loadExamples() {
            state.notifications = JSON.parse(JSON.stringify(examples));
            updateUI();
            alert('✓ 已載入 3 則範例通知');
        }

        // 事件監聽
        tagSelect.addEventListener('change', (e) => {
            if (e.target.value === 'custom') {
                customTagGroup.style.display = 'block';
                customTag.focus();
            } else {
                customTagGroup.style.display = 'none';
            }
        });

        titleInput.addEventListener('input', (e) => {
            const count = e.target.value.length;
            titleCharCount.textContent = `${count} / 50 字`;
        });

        subtitleInput.addEventListener('input', (e) => {
            const count = e.target.value.length;
            subtitleCharCount.textContent = `${count} / 100 字`;
        });

        addBtn.addEventListener('click', addNotification);
        copyBtn.addEventListener('click', copyText);
        exportBtn.addEventListener('click', exportJSON);

        // 新增通知
        function addNotification() {
            const tag = tagSelect.value === 'custom' ? customTag.value : tagSelect.value;
            const title = titleInput.value.trim();
            const subtitle = subtitleInput.value.trim();
            const sendTime = sendDateTime.value;
            const deadline = deadlineDate.value;

            if (!tag) {
                alert('請選擇或輸入活動標籤');
                return;
            }

            if (!title) {
                alert('請輸入標題文字');
                return;
            }

            if (state.notifications.length >= state.maxNotifications) {
                alert(`最多只能新增 ${state.maxNotifications} 則通知`);
                return;
            }

            const notification = {
                id: Date.now(),
                tag,
                title,
                subtitle,
                sendTime,
                deadline
            };

            state.notifications.push(notification);
            updateUI();
            resetForm();
        }

        // 刪除通知
        function deleteNotification(id) {
            state.notifications = state.notifications.filter(n => n.id !== id);
            updateUI();
        }

        // 更新 UI
        function updateUI() {
            updatePreview();
            updateNotificationsList();
            updateButtonState();
        }

        // 更新預覽
        function updatePreview() {
            if (state.notifications.length === 0) {
                phoneContent.innerHTML = '<div class="empty-state">還沒有通知</div>';
                return;
            }

            phoneContent.innerHTML = state.notifications.map(notif => {
                const sendTimeFormatted = notif.sendTime ? new Date(notif.sendTime).toLocaleString('zh-TW', {
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit'
                }).replace(/\//g, '-') : '未設定';

                return `
                    <div class="notification-card">
                        <div class="notification-icon">📢</div>
                        <div class="notification-content">
                            <div class="notification-header">
                                <span class="notification-tag">${escapeHtml(notif.tag)}</span>
                            </div>
                            <div class="notification-title">${escapeHtml(notif.title)}</div>
                            ${notif.subtitle ? `<div class="notification-subtitle">${escapeHtml(notif.subtitle)}</div>` : ''}
                            <div class="notification-meta">
                                <span>${sendTimeFormatted}</span>
                            </div>
                        </div>
                        <div class="notification-arrow">›</div>
                    </div>
                `;
            }).join('');
        }

        // 更新通知列表
        function updateNotificationsList() {
            notificationCount.textContent = state.notifications.length;

            if (state.notifications.length === 0) {
                notificationsList.style.display = 'none';
                return;
            }

            notificationsList.style.display = 'block';
            notificationsContainer.innerHTML = state.notifications.map(notif => `
                <div class="notification-item">
                    <div class="notification-item-text">
                        <strong>${escapeHtml(notif.tag)}</strong>: ${escapeHtml(notif.title)}
                    </div>
                    <button class="notification-item-delete" onclick="deleteNotification(${notif.id})">刪除</button>
                </div>
            `).join('');
        }

        // 更新按鈕狀態
        function updateButtonState() {
            addBtn.disabled = state.notifications.length >= state.maxNotifications;
        }

        // 複製文案
        function copyText() {
            if (state.notifications.length === 0) {
                alert('還沒有通知可以複製');
                return;
            }

            const text = state.notifications.map(notif => {
                const lines = [
                    `【${notif.tag}】`,
                    notif.title
                ];
                if (notif.subtitle) lines.push(notif.subtitle);
                if (notif.deadline) lines.push(`活動只到${notif.deadline}`);
                if (notif.sendTime) {
                    const date = new Date(notif.sendTime);
                    lines.push(date.toLocaleString('zh-TW'));
                }
                return lines.join('\n');
            }).join('\n\n---\n\n');

            navigator.clipboard.writeText(text).then(() => {
                alert('✓ 文案已複製到剪貼簿');
            }).catch(() => {
                alert('複製失敗，請重試');
            });
        }

        // 匯出 JSON
        function exportJSON() {
            if (state.notifications.length === 0) {
                alert('還沒有通知可以匯出');
                return;
            }

            const dataStr = JSON.stringify(state.notifications, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `push_notifications_${new Date().toISOString().slice(0, 10)}.json`;
            link.click();
            URL.revokeObjectURL(url);
        }

        // 重置表單
        function resetForm() {
            tagSelect.value = '';
            customTag.value = '';
            customTagGroup.style.display = 'none';
            titleInput.value = '';
            subtitleInput.value = '';
            sendDateTime.value = '';
            deadlineDate.value = '';
            titleCharCount.textContent = '0 / 50 字';
            subtitleCharCount.textContent = '0 / 100 字';
            titleInput.focus();
        }

        // 工具函數
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 初始化
        updateButtonState();
    </script>
</body>
</html>
